name: Deploy to GCP

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  API_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/winnow/api
  WORKER_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/winnow/worker
  WEB_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/winnow/web

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push API image
        run: |
          cd services/api
          docker build --no-cache \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:latest .
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy winnow-api \
            --image=${{ env.API_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:us-central1:winnow-db \
            --vpc-connector=winnow-connector \
            --set-secrets=DB_URL=db-url:latest,AUTH_SECRET=auth-secret:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,RESEND_API_KEY=resend-api-key:latest,REDIS_URL=redis-url:latest,AUTH0_DOMAIN=auth0-domain:latest,AUTH0_CLIENT_ID=auth0-client-id:latest,AUTH0_CLIENT_SECRET=auth0-client-secret:latest \
            --set-env-vars=FRONTEND_URL=https://winnowcc.ai,AUTH_COOKIE_NAME=rm_session \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10

      - name: Run migrations
        run: |
          if gcloud run jobs describe winnow-migrate --region=${{ env.REGION }} >/dev/null 2>&1; then
            gcloud run jobs update winnow-migrate \
              --image=${{ env.API_IMAGE }}:${{ github.sha }} \
              --region=${{ env.REGION }}
          else
            gcloud run jobs create winnow-migrate \
              --image=${{ env.API_IMAGE }}:${{ github.sha }} \
              --region=${{ env.REGION }} \
              --set-secrets=DB_URL=db-url:latest \
              --set-cloudsql-instances=${{ env.PROJECT_ID }}:us-central1:winnow-db \
              --vpc-connector=winnow-connector \
              --command=alembic \
              --args=upgrade,head
          fi
          gcloud run jobs execute winnow-migrate --region=${{ env.REGION }} --wait

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Worker image
        run: |
          cd services/api
          docker build --no-cache -f Dockerfile.worker -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} -t ${{ env.WORKER_IMAGE }}:latest .
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WORKER_IMAGE }}:latest

      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy winnow-worker \
            --image=${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:us-central1:winnow-db \
            --vpc-connector=winnow-connector \
            --set-secrets=DB_URL=db-url:latest,AUTH_SECRET=auth-secret:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,RESEND_API_KEY=resend-api-key:latest,REDIS_URL=redis-url:latest,AUTH0_DOMAIN=auth0-domain:latest,AUTH0_CLIENT_ID=auth0-client-id:latest,AUTH0_CLIENT_SECRET=auth0-client-secret:latest \
            --set-env-vars=FRONTEND_URL=https://winnowcc.ai \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Web image
        run: |
          cd apps/web
          docker build --no-cache \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://winnow-api-cdn2d6pc5q-uc.a.run.app \
            --build-arg NEXT_PUBLIC_APP_URL=https://winnowcc.ai \
            --build-arg NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_WEB_DSN }} \
            --build-arg NEXT_PUBLIC_SENTRY_ENVIRONMENT=production \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.POSTHOG_KEY }} \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com \
            -t ${{ env.WEB_IMAGE }}:${{ github.sha }} \
            -t ${{ env.WEB_IMAGE }}:latest .
          docker push ${{ env.WEB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WEB_IMAGE }}:latest

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy winnow-web \
            --image=${{ env.WEB_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10
