name: Deploy to GCP

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  API_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/winnow/api
  WORKER_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/winnow/worker
  SCHEDULER_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/winnow/scheduler
  WEB_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/winnow/web

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push API image
        run: |
          cd services/api
          docker build --no-cache \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:latest .
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Get Worker URL
        id: worker-url
        run: |
          WORKER_URL=$(gcloud run services describe winnow-worker --region=${{ env.REGION }} --format='value(status.url)' 2>/dev/null || echo "")
          echo "url=$WORKER_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy winnow-api \
            --image=${{ env.API_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:us-central1:winnow-db \
            --vpc-connector=winnow-connector \
            --set-secrets=DB_URL=db-url:latest,AUTH_SECRET=auth-secret:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,RESEND_API_KEY=resend-api-key:latest,REDIS_URL=redis-url:latest,AUTH0_DOMAIN=auth0-domain:latest,AUTH0_CLIENT_ID=auth0-client-id:latest,AUTH0_CLIENT_SECRET=auth0-client-secret:latest,ADMIN_TOKEN=admin-token:latest,RAPIDAPI_KEY=rapidapi-key:latest,TELNYX_API_KEY=TELNYX_API_KEY:latest,TELNYX_FROM_NUMBER=TELNYX_PHONE_NUMBER:latest,SENDGRID_WEBHOOK_SECRET=sendgrid-webhook-secret:latest \
            --set-env-vars=^::^FRONTEND_URL=https://winnowcc.ai::AUTH_COOKIE_NAME=rm_session::AUTH_COOKIE_SECURE=true::COOKIE_DOMAIN=.winnowcc.ai::EMBEDDING_PROVIDER=sentence-transformers::JOB_SOURCES=remotive,themuse,greenhouse,lever,remoteok,adzuna,jooble,usajobs,jobicy,himalayas,manual,jsearch::GCS_BUCKET=winnow-resumes-prod::SCHEDULER_ENABLED=true::WINNOW_PROCESS_TYPE=api::WORKER_HEALTH_URL=${{ steps.worker-url.outputs.url }} \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=80 \
            --min-instances=1 \
            --max-instances=5

      - name: Run migrations
        run: |
          if gcloud run jobs describe winnow-migrate --region=${{ env.REGION }} >/dev/null 2>&1; then
            gcloud run jobs update winnow-migrate \
              --image=${{ env.API_IMAGE }}:${{ github.sha }} \
              --region=${{ env.REGION }} \
              --set-secrets=DB_URL=db-url:latest \
              --set-cloudsql-instances=${{ env.PROJECT_ID }}:us-central1:winnow-db \
              --vpc-connector=winnow-connector \
              --command=python \
              --args=-m,alembic,upgrade,head
          else
            gcloud run jobs create winnow-migrate \
              --image=${{ env.API_IMAGE }}:${{ github.sha }} \
              --region=${{ env.REGION }} \
              --set-secrets=DB_URL=db-url:latest \
              --set-cloudsql-instances=${{ env.PROJECT_ID }}:us-central1:winnow-db \
              --vpc-connector=winnow-connector \
              --command=python \
              --args=-m,alembic,upgrade,head
          fi
          gcloud run jobs execute winnow-migrate --region=${{ env.REGION }} --wait

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Worker image
        run: |
          cd services/api
          docker build --no-cache -f Dockerfile.worker -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} -t ${{ env.WORKER_IMAGE }}:latest .
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WORKER_IMAGE }}:latest

      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy winnow-worker \
            --image=${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:us-central1:winnow-db \
            --vpc-connector=winnow-connector \
            --set-secrets=DB_URL=db-url:latest,AUTH_SECRET=auth-secret:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,RESEND_API_KEY=resend-api-key:latest,REDIS_URL=redis-url:latest,AUTH0_DOMAIN=auth0-domain:latest,AUTH0_CLIENT_ID=auth0-client-id:latest,AUTH0_CLIENT_SECRET=auth0-client-secret:latest,ADMIN_TOKEN=admin-token:latest,RAPIDAPI_KEY=rapidapi-key:latest,TELNYX_API_KEY=TELNYX_API_KEY:latest,TELNYX_FROM_NUMBER=TELNYX_PHONE_NUMBER:latest \
            --set-env-vars=^::^FRONTEND_URL=https://winnowcc.ai::EMBEDDING_PROVIDER=sentence-transformers::JOB_SOURCES=remotive,themuse,greenhouse,lever,remoteok,adzuna,jooble,usajobs,jobicy,himalayas,manual,jsearch::GCS_BUCKET=winnow-resumes-prod::WINNOW_PROCESS_TYPE=worker \
            --memory=4Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=8 \
            --no-cpu-throttling \
            --execution-environment=gen2

  deploy-scheduler:
    name: Deploy Scheduler
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Scheduler image
        run: |
          cd services/api
          docker build --no-cache -f Dockerfile.scheduler -t ${{ env.SCHEDULER_IMAGE }}:${{ github.sha }} -t ${{ env.SCHEDULER_IMAGE }}:latest .
          docker push ${{ env.SCHEDULER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.SCHEDULER_IMAGE }}:latest

      - name: Deploy Scheduler to Cloud Run
        run: |
          gcloud run deploy winnow-scheduler \
            --image=${{ env.SCHEDULER_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:us-central1:winnow-db \
            --vpc-connector=winnow-connector \
            --set-secrets=DB_URL=db-url:latest,AUTH_SECRET=auth-secret:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,RESEND_API_KEY=resend-api-key:latest,REDIS_URL=redis-url:latest,AUTH0_DOMAIN=auth0-domain:latest,AUTH0_CLIENT_ID=auth0-client-id:latest,AUTH0_CLIENT_SECRET=auth0-client-secret:latest,ADMIN_TOKEN=admin-token:latest,RAPIDAPI_KEY=rapidapi-key:latest,TELNYX_API_KEY=TELNYX_API_KEY:latest,TELNYX_FROM_NUMBER=TELNYX_PHONE_NUMBER:latest \
            --set-env-vars=^::^FRONTEND_URL=https://winnowcc.ai::EMBEDDING_PROVIDER=sentence-transformers::JOB_SOURCES=remotive,themuse,greenhouse,lever,remoteok,adzuna,jooble,usajobs,jobicy,himalayas,manual,jsearch::GCS_BUCKET=winnow-resumes-prod::SCHEDULER_ENABLED=true::SCHEDULER_DEFAULT_LOCATION=USA \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=1 \
            --no-cpu-throttling

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Web image
        run: |
          cd apps/web
          docker build --no-cache \
            --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.winnowcc.ai \
            --build-arg NEXT_PUBLIC_APP_URL=https://winnowcc.ai \
            --build-arg NEXT_PUBLIC_AUTH0_DOMAIN=$(gcloud secrets versions access latest --secret=auth0-domain) \
            --build-arg NEXT_PUBLIC_AUTH0_CLIENT_ID=$(gcloud secrets versions access latest --secret=auth0-client-id) \
            --build-arg NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_WEB_DSN }} \
            --build-arg NEXT_PUBLIC_SENTRY_ENVIRONMENT=production \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.POSTHOG_KEY }} \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com \
            -t ${{ env.WEB_IMAGE }}:${{ github.sha }} \
            -t ${{ env.WEB_IMAGE }}:latest .
          docker push ${{ env.WEB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WEB_IMAGE }}:latest

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy winnow-web \
            --image=${{ env.WEB_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10
